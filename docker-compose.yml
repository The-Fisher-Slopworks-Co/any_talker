services:
  keydb:
    image: eqalpha/keydb:latest
    container_name: any_talker_keydb
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  keydb_data:
