name: PR preview deploy

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  preview:
    name: Deploy PR head to preview
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/deploy') &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    concurrency:
      group: pr-preview-deploy-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Acknowledge comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket

      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_DATA=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          {
            echo "sha=$(echo "$PR_DATA" | jq -r .head.sha)"
            echo "branch=$(echo "$PR_DATA" | jq -r .head.ref)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.img.outputs.name }}:preview
          build-args: |
            GIT_COMMIT=${{ steps.pr.outputs.sha }}
          cache-from: type=gha,scope=preview
          cache-to: type=gha,mode=max,scope=preview

      - name: Trigger Portainer webhook
        env:
          PREVIEW_DEPLOY_WEBHOOK_URL: ${{ secrets.PREVIEW_DEPLOY_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --max-time 30 \
            "$PREVIEW_DEPLOY_WEBHOOK_URL"

      - name: Comment success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          SHA: ${{ steps.pr.outputs.sha }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "✅ Preview deployed: branch \`$BRANCH\` at \`$SHA\`."
